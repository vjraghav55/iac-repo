name: ci-cd-container

on:
  workflow_dispatch:
    inputs:
       APP_NAME:
          description: 'Name of App'
          required: true
          type: string
          default: tr-container-app-cus-01
       TAG:
          description: 'Image Version'
          required: true
          type: string

env:
  IMAGE_NAME: flask_app
  AZURE_SUBSCRIPTION: b983da0b-033c-4c43-b7b2-eb5e4a976343
  APP_NAME: ${{ github.event.inputs.APP_NAME }}
  TAG: ${{ github.event.inputs.TAG }}
  RESOURCE_GROUP: azusctr-uat-rg
  CONTAINERAPPS_ENVIRONMENT: managedEnvironment-flaskapp

jobs:
  ci:
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, Linux, X64, trumio-prod-orgrunner]
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: container-test
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: docker context create builders

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest
          endpoint: builders

      - name: Docker Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -f ./Dockerfile -t ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .
          docker push ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      # - name: Trivy Scan - All Severities
      #   uses: aquasecurity/trivy-action@v0.16.1
      #   with:
      #     image-ref: ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
      #     exit-code: 0
      #     severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL 
      #     format: 'table'
      #     output: 'trivy-results.sarif'

      # - name: Install Azure CLI
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y ca-certificates curl apt-transport-https lsb-release gnupg
      #     curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
      #     AZ_REPO=$(lsb_release -cs)
      #     echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO main" | sudo tee /etc/apt/sources.list.d/azure-cli.list
      #     sudo apt-get update
      #     sudo apt-get install -y azure-cli

      # - uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}

      # - name: Upload to blob storage
      #   run: |
      #     today=$(date +%d-%m-%Y-%H.%M)
      #     az storage blob upload-batch --account-name trumiotrivysa --auth-mode login -d "prod-trivy-scan/container/trivy-$today" --source . --pattern "trivy-results.sarif"

  cd:
    needs: ci
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, Linux, X64, trumio-prod-orgrunner]
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Azure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl apt-transport-https lsb-release
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg > /dev/null
          AZ_REPO=$(lsb_release -cs)
          echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO main" | sudo tee /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y azure-cli

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # - name: Deploy Azure Container apps
      #   run: |
      #     az containerapp update \
      #       --name ${{ env.APP_NAME }} \
      #       --resource-group ${{ env.RESOURCE_GROUP }} \
      #       --image ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
      #       --environment ${{ env.CONTAINERAPPS_ENVIRONMENT }}

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.REGISTRY_URL }}
          containerAppName: ${{ env.APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
