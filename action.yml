name: 'Cloud Cost Estimator'
description: 'Estimate monthly IaC costs (Terraform/CloudFormation) for AWS, GCP, Azure using Infracost'
author: 'manmohanmirkar'
branding:
  icon: 'dollar-sign'
  color: 'green'
inputs:
  iac-path:
    description: 'Path to IaC directory (Terraform/CloudFormation)'
    required: true
    default: '.'
  provider:
    description: 'Cloud provider: aws, gcp, azure'
    required: true
    default: 'aws'
  infracost-api-key:
    description: 'Infracost API key required for cost estimation'
    required: true
  github-token:
    description: 'GitHub token used to create or update pull request comments'
    required: false
  comment-on-pr:
    description: 'Create or update a pull request comment with the cost summary'
    required: false
    default: 'true'
  upload-report-artifact:
    description: 'Upload generated cost reports to the GitHub Actions run UI'
    required: false
    default: 'true'
  artifact-name:
    description: 'Artifact name used when uploading the generated reports'
    required: false
    default: 'cloud-cost-report'
outputs:
  total-monthly-cost:
    description: 'Total estimated monthly cost (USD)'
    value: ${{ steps.run-cost.outputs.total-monthly-cost }}
  breakdown:
    description: 'Full JSON cost breakdown'
    value: ${{ steps.run-cost.outputs.breakdown }}
  report:
    description: 'Path to generated cost report'
    value: ${{ steps.run-cost.outputs.report }}
  report-json:
    description: 'Path to generated JSON report'
    value: ${{ steps.run-cost.outputs.report-json }}
runs:
  using: 'composite'
  steps:
    - id: run-cost
      run: ${{ github.action_path }}/entrypoint.sh
      shell: bash
      env:
        IAC_PATH: ${{ inputs.iac-path }}
        PROVIDER: ${{ inputs.provider }}
        INFRACOST_API_KEY: ${{ inputs.infracost-api-key || '' }}
    - name: Upload Report Artifact
      if: ${{ inputs.upload-report-artifact == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ steps.run-cost.outputs.report }}
          ${{ steps.run-cost.outputs.report-json }}
        if-no-files-found: error
    - name: Comment On Pull Request
      if: ${{ inputs.comment-on-pr == 'true' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') }}
      uses: actions/github-script@v8
      env:
        REPORT_PATH: ${{ steps.run-cost.outputs.report }}
        TOTAL_MONTHLY_COST: ${{ steps.run-cost.outputs.total-monthly-cost }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- cloud-cost-estimator-action -->';
          const reportPath = process.env.REPORT_PATH;
          const totalCost = process.env.TOTAL_MONTHLY_COST || 'unknown';
          const reportBody = reportPath && fs.existsSync(reportPath)
            ? fs.readFileSync(reportPath, 'utf8').trim()
            : 'Cost report file was not generated.';
          const body = [
            marker,
            '## Cloud Cost Estimate',
            '',
            `Estimated monthly cost: **$${totalCost} USD**`,
            '',
            '```text',
            reportBody.slice(0, 60000),
            '```',
          ].join('\n');

          const issue_number = context.payload.pull_request.number;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number,
          });

          const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
          }
