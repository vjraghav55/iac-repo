name: Test Cloud Cost Estimator
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Infracost secret
        id: secret_check
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          if [ -n "$INFRACOST_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "INFRACOST_API_KEY is not set; skipping cost estimation test."
          fi
      - name: Fix permissions
        run: chmod +x entrypoint.sh
      - name: Run Cost Estimation
        if: ${{ steps.secret_check.outputs.has_key == 'true' }}
        id: cost
        uses: ./
        with:
          iac-path: iac-repo/trumio-iac-main/Trumio-IAC
          provider: azure
          infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}
          comment-on-pr: 'false'
          upload-report-artifact: 'true'
      - name: Show Results
        if: ${{ steps.secret_check.outputs.has_key == 'true' }}
        run: |
          echo "Total Monthly Cost: ${{ steps.cost.outputs.total-monthly-cost }} USD"
          cat ${{ steps.cost.outputs.report }}
          ls -la iac-repo/trumio-iac-main/Trumio-IAC/*.txt iac-repo/trumio-iac-main/Trumio-IAC/*.json || true
